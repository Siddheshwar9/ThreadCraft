<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#B8941E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="246" fill="#1F1F1F"/>
  <!-- Stitched border -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="12 8" opacity="0.6"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
  <!-- T letterform - vertical stroke -->
  <rect x="232" y="160" width="18" height="200" rx="4" fill="url(#goldGrad)"/>
  <!-- T letterform - horizontal stroke (needle shape) -->
  <rect x="168" y="148" width="146" height="16" rx="8" fill="url(#goldGrad)"/>
  <!-- Needle eye -->
  <ellipse cx="305" cy="156" rx="8" ry="5" fill="#1F1F1F" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- Thread from needle forming C curve -->
  <path d="M 305 161 C 330 200, 350 260, 330 310 C 310 360, 270 380, 220 370" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Thread end flourish -->
  <path d="M 220 370 C 210 367, 200 360, 195 350" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Small decorative cross-stitch marks -->
  <g opacity="0.4" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round">
    <line x1="155" y1="250" x2="162" y2="257"/>
    <line x1="162" y1="250" x2="155" y2="257"/>
    <line x1="355" y1="250" x2="362" y2="257"/>
    <line x1="362" y1="250" x2="355" y2="257"/>
    <line x1="253" y1="405" x2="260" y2="412"/>
    <line x1="260" y1="405" x2="253" y2="412"/>
  </g>
</svg>
